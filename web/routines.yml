running_injury_prevention:
  name: "Runners Prehab & Mobility"
  description: "Proactively build strength, stability and mobility to improve running technique and reduce injury risk."
  rotations: 3
  movement_duration: 40
  rest_duration: 20
  stations:
    - posterior_chain_strength
    - knee_stability
    - hip_mobility_activation
    - core_stability
    - single_leg_strength
    - upper_back_pull
    - calf_achilles_stability
    - ankle_stability

cyclist_power_builder:
  name: "Cyclists Power Builder"
  description: "Build stability and power for explosive sprinting and short, high intensity efforts on the bike."
  rotations: 3
  movement_duration: 40
  rest_duration: 20
  stations:
    - quad_strength
    - posterior_chain_strength
    - single_leg_strength
    - core_stability
    - hip_flexor_strength
    - upper_back_pull
    - knee_stability
    - calf_achilles_stability

whole_body_conditioner:
  name: "Whole Body Conditioner"
  description: "A whole body workout to build mobility and strength to prevent injury and improve conditioning."
  rotations: 3
  movement_duration: 40
  rest_duration: 20
  stations:
    - core_stability
    - posterior_chain_strength
    - shoulder_stability_press
    - upper_back_pull
    - upper_back_push
    - quad_strength
    - loaded_carries

runners_isometric:
  name: "Runners Bodyweight & Isometric"
  description: "Bodyweight & isometric movements to improve running technique and reduce injury risk."
  rotations: 3
  movement_duration: 45
  rest_duration: 15
  movements:
    - ["dead_bug", "bird_dog"]                                          # deep core anti-extension
    - ["plank", "hollow_hold", "side_plank"]                           # core isometric holds
    - ["leg_lift", "single_leg_lift"]                                   # anterior core, hip flexor strength
    - ["glute_bridge", "single_leg_deadlift_bodyweight"]               # posterior chain & glute
    - ["copenhagen_plank", "side_plank"]                               # adductors & lateral hip
    - ["wall_sit", "bulgarian_split_bodyweight"]                       # isometric & single-leg hold
    - ["squat_bodyweight", "squat_jump", "reverse_lunge_bodyweight"]   # dynamic quad & glute
    - ["single_leg_calf_raise", "single_leg_pogos"]                    # soleus, Achilles, ankle stiffness