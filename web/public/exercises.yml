groups:
  - id: hinge_posterior
    name: Hinge / Posterior Chain
    description: Glutes, hamstrings, erectors — posterior chain foundation
    injury_note: Critical for disc health; prioritise neutral spine throughout
    exercises:
      strength:
        - name: KB Romanian Deadlift
          equipment: kettlebell
          cues: Hinge at hip, soft knee, neutral spine, feel hamstring stretch
      stability:
        - name: Single-leg Romanian Deadlift
          equipment: kettlebell
          cues: Slow controlled hinge, standing leg softly bent, hips square

  - id: squat_knee
    name: Squat / Knee Bend
    description: Quads and glutes — don't overweight given running/cycling
    injury_note: Keep torso upright to reduce spinal compression
    exercises:
      strength:
        - name: Goblet Squat
          equipment: kettlebell
          cues: KB at chest, elbows inside knees, upright torso, full depth
      stability:
        - name: Bulgarian Split Squat
          equipment: dumbbell
          cues: Slow 3-second descent, rear foot elevated, hips square

  - id: core
    name: Core
    description: Anti-rotation, anti-extension — disc-safe core work
    injury_note: Avoid spinal flexion under load (no crunches/sit-ups)
    exercises:
      strength:
        - name: Leg-Lift
          equipment: bodyweight
          cues: Lower back pressed into floor throughout, move slowly, breathe out on extension
        - name: Bird Dog
          equipment: bodyweight
          cues: Opposite arm and leg, hold 3 seconds, no hip rotation
      stability:
        - name: Pallof Press
          equipment: resistance_band
          cues: Press out slowly, resist rotation, hold for 2 seconds extended
        - name: Suitcase Carry
          equipment: kettlebell
          cues: Single KB at side, resist lateral lean, engage obliques

  - id: upper_pull
    name: Upper Body - Pull
    description: Upper back, lats, rear delts — counters cycling posture
    injury_note: Brace core during rows to protect lumbar spine
    exercises:
      strength:
        - name: DB Bent-over Row
          equipment: dumbbell
          cues: Hinge to 45°, row to hip, squeeze scapula, controlled descent
      stability:
        - name: Renegade Row
          equipment: dumbbell
          cues: Plank position, slow row, minimal hip rotation, brace hard

  - id: upper_push
    name: Upper Body - Push
    description: Chest, shoulders, triceps
    injury_note: Floor press preferred over bench — limits range, safer for spine
    exercises:
      strength:
        - name: DB Floor Press
          equipment: dumbbell
          cues: Feet flat, lower back neutral (not arched), controlled descent to floor
        - name: DB Overhead Press
          equipment: dumbbell
          cues: Seated for spinal support, brace core, don't flare ribs
        - name: Press-up
          equipment: bodyweight
          cues: Push floor away, move as one rigid unit

      stability:
        - name: Single-arm DB Floor Press
          equipment: dumbbell
          cues: One arm, resist rotation, brace obliques, slow and controlled
        - name: Push-up with 3s Negative
          equipment: bodyweight
          cues: Slow 3-second descent, full body tension, elbows at 45°

  - id: glute_isolation
    name: Glute Isolation
    description: Often skipped — critical for runners and cyclists with disc issues
    injury_note: Weak glutes are a primary driver of lumbar disc stress
    exercises:
      strength:
        - name: KB Hip Thrust
          equipment: kettlebell
          cues: Shoulders on bench, KB on hips, squeeze glutes hard at top
      stability:
        - name: Single-leg Glute Bridge
          equipment: bodyweight
          cues: One leg extended, drive through heel, hold 2 seconds at top

  - id: carry
    name: Carry / Loaded Movement
    description: Full-body, grip, obliques — good circuit finisher
    injury_note: Keep spine tall and neutral throughout all carries
    exercises:
      strength:
        - name: KB Goblet Carry
          equipment: kettlebell
          cues: KB at chest, upright posture, brace core throughout walk
      stability:
        - name: KB Suitcase Carry
          equipment: kettlebell
          cues: Single KB, resist lateral lean, obliques working hard
        - name: KB Overhead Carry
          equipment: kettlebell
          cues: Single arm locked out overhead, tall spine, controlled steps