barbell_back_squat:
  - name: Bar Back Squat
    category: knee_strength
    category_name: Knee Strength
    side: false
    requires: ["olympic_bar"]
    cues: Rest the bar across your upper traps, brace before each rep, and keep the bar stacked over mid-foot.

bird_dog:
  - name: Bird Dog
    category: core_stability
    category_name: Core Stability
    side: false
    cues: Alternate opposite arm and leg, keep your hips level, and reach long rather than lifting high.

bulgarian_split_barbell:
  - name: Bar Bulgarian Split Squat
    category: knee_stability
    category_name: Knee Stability
    side: true
    requires: ["step_box", "olympic_bar"]
    cues: Set the bar across your upper back, keep your torso quiet, and complete all reps on one leg before changing sides.

bulgarian_split_bodyweight:
  - name: Bulgarian Split Squat
    category: knee_stability
    category_name: Knee Stability
    side: true
    requires: ["step_box"]
    cues: Rear foot elevated, front shin mostly vertical, and finish all reps on one side before switching.

bulgarian_split_dumbbell:
  - name: DB Bulgarian Split Squat
    category: knee_stability
    category_name: Knee Stability
    side: true
    requires: ["step_box", "dumbbell"]
    cues: Hold one dumbbell in the hand opposite the front leg, move slowly on the way down, and finish one side before switching.

bulgarian_split_kettlebell:
  - name: KB Bulgarian Split Squat
    category: knee_stability
    category_name: Knee Stability
    side: true
    requires: ["step_box", "kettlebell"]
    cues: Hold one kettlebell in the hand opposite the front leg, stay stacked over the front foot, and complete one side at a time.

dead_bug:
  - name: Dead Bug
    category: core_stability
    category_name: Core Stability
    side: false
    cues: Alternate opposite arm and leg, press your lower back into the floor, and move slowly enough that nothing shifts.

deadlift_barbell:
  - name: Bar Deadlift
    category: posterior_chain_strength
    category_name: Posterior Chain Strength
    side: false
    requires: ["olympic_bar"]
    cues: Set the bar over mid-foot, pull the slack out first, and drive through the floor while keeping the bar close.

deadlift_bodyweight:
  - name: Hinge
    category: posterior_chain_strength
    category_name: Posterior Chain Strength
    side: false
    cues: Hinge at the hips, keep your back flat, and load the hamstrings before standing tall.

deadlift_dumbbell:
  - name: DB Deadlift
    category: posterior_chain_strength
    category_name: Posterior Chain Strength
    side: false
    requires: ["dumbbell"]
    cues: Hold a dumbbell in each hand at your sides, keep them close to your legs, and stand tall without shrugging.

deadlift_kettlebell:
  - name: KB Deadlift
    category: posterior_chain_strength
    category_name: Posterior Chain Strength
    side: false
    requires: ["kettlebell"]
    cues: Hold the kettlebell between your feet with both hands, wedge into the floor, and stand up by pushing the ground away.

glute_bridge:
  - name: Glute Bridge
    category: hip_mobility
    category_name: Hip Mobility
    side: false
    cues: Drive through the heels, squeeze the glutes at the top, and avoid arching the lower back.

glute_bridge_dumbbell:
  - name: DB Glute Bridge
    category: hip_mobility
    category_name: Hip Mobility
    side: false
    requires: ["dumbbell"]
    cues: Rest the dumbbell horizontally across the hips, keep the ribs down, and squeeze hard at the top.

glute_bridge_kettlebell:
  - name: KB Glute Bridge
    category: hip_mobility
    category_name: Hip Mobility
    side: false
    requires: ["kettlebell"]
    cues: Rest the kettlebell across the hips, pin it in place with your hands, and drive straight up through the heels.

goblet_squat_dumbbell:
  - name: DB Goblet Squat
    category: knee_strength
    category_name: Knee Strength
    side: false
    requires: ["dumbbell"]
    cues: Hold one dumbbell vertically at your chest in a goblet position, keep the load close, and drive up through the whole foot.

goblet_squat_kettlebell:
  - name: KB Goblet Squat
    category: knee_strength
    category_name: Knee Strength
    side: false
    requires: ["kettlebell"]
    cues: Hold the bell in a goblet position tight to your chest, elbows inside your knees, and stay tall through the torso.

hip_90_90:
  - name: 90/90 Hip Stretch
    category: hip_mobility
    category_name: Hip Mobility
    side: true
    cues: Sit tall, fold over the front shin, and spend time on one side before switching.

hip_flexor_lunge:
  - name: Hip Flexor Lunge Stretch
    category: hip_mobility
    category_name: Hip Mobility
    side: true
    cues: Tuck the tailbone first, then glide forward into the stretch and complete one side before switching.

hollow_hold:
  - name: Hollow Hold
    category: core_strength
    category_name: Core Strength
    side: false
    cues: Arms overhead, legs low, ribs tucked down, and breathe without letting your lower back lift.

leg_lift:
  - name: Leg Lift
    category: core_strength
    category_name: Core Strength
    side: false
    cues: Keep your lower back pressed into the floor, lower your legs slowly, and stop before your back peels off the ground.

pallof_press:
  - name: Pallof Press
    category: core_stability
    category_name: Core Stability
    side: true
    requires: ["resistance_band"]
    cues: Stand side-on to the band anchor, press straight out, and complete one side before turning around.

plank:
  - name: Plank
    category: core_stability
    category_name: Core Stability
    side: false
    cues: Squeeze glutes and quads, keep one straight line from shoulders to heels, and do not let the hips sag.

pogos:
  - name: Pogo Jumps
    category: ankle_stability
    category_name: Ankle Stability
    side: false
    cues: Stay on the forefoot, keep ground contact short, and think springy ankles rather than a deep knee bend.

push_up:
  - name: Push Up
    category: upper_back_strength
    category_name: Upper Back Strength
    side: false
    cues: Hands just outside shoulder width, body rigid from head to heel, and lower under control.

rdl_barbell:
  - name: Bar Romanian Deadlift
    category: posterior_chain_strength
    category_name: Posterior Chain Strength
    side: false
    requires: ["olympic_bar"]
    cues: Hold the bar in your hands, unlock the knees, push the hips back, and keep the lats tight the whole rep.

rdl_bodyweight:
  - name: Romanian Deadlift
    category: posterior_chain_strength
    category_name: Posterior Chain Strength
    side: false
    cues: Soft bend in the knees, push the hips back, and stop when the hamstrings are fully loaded.

rdl_dumbbell:
  - name: DB Romanian Deadlift
    category: posterior_chain_strength
    category_name: Posterior Chain Strength
    side: false
    requires: ["dumbbell"]
    cues: Hold a dumbbell in each hand at your sides, slide them down the thighs, and return once the hamstrings are loaded.

rdl_kettlebell:
  - name: KB Romanian Deadlift
    category: posterior_chain_strength
    category_name: Posterior Chain Strength
    side: false
    requires: ["kettlebell"]
    cues: Hold the kettlebell with both hands in front of you, keep it close, and reach the hips back without rounding.

reverse_lunge_barbell:
  - name: Bar Reverse Lunge
    category: knee_stability
    category_name: Knee Stability
    side: false
    requires: ["olympic_bar"]
    cues: Keep the bar on your upper back, alternate sides rep to rep, and stay upright as you step back.

reverse_lunge_bodyweight:
  - name: Reverse Lunge
    category: knee_stability
    category_name: Knee Stability
    side: false
    cues: Alternate sides rep to rep, step back with control, and keep the front knee tracking over the foot.

reverse_lunge_dumbbell:
  - name: DB Reverse Lunge
    category: knee_stability
    category_name: Knee Stability
    side: false
    requires: ["dumbbell"]
    cues: Alternate sides rep to rep while holding one dumbbell in the hand opposite the front leg for each rep.

reverse_lunge_kettlebell:
  - name: KB Reverse Lunge
    category: knee_stability
    category_name: Knee Stability
    side: false
    requires: ["kettlebell"]
    cues: Alternate sides rep to rep while holding one kettlebell in the hand opposite the front leg for each rep.

single_arm_row_dumbbell:
  - name: Single Arm DB Row
    category: upper_back_strength
    category_name: Upper Back Strength
    side: true
    requires: ["dumbbell"]
    cues: Brace with the free hand on your thigh or a bench, drive the elbow back, and finish one side before switching.

single_arm_row_kettlebell:
  - name: Single Arm KB Row
    category: upper_back_strength
    category_name: Upper Back Strength
    side: true
    requires: ["kettlebell"]
    cues: Brace with the free hand on your thigh or a bench, row with one arm, and complete one side before switching.

single_leg_calf_raise:
  - name: Single Leg Calf Raise
    category: ankle_stability
    category_name: Ankle Stability
    side: true
    cues: Complete one side before switching, go all the way up and all the way down, and pause at the top.

single_leg_calf_raise_dumbbell:
  - name: Weighted Single Leg Calf Raise
    category: ankle_stability
    category_name: Ankle Stability
    side: true
    requires: ["dumbbell"]
    cues: Hold one dumbbell in the hand opposite the working leg, move through a full range, and finish one side before switching.

single_leg_lift:
  - name: Single Leg Lift
    category: core_strength
    category_name: Core Strength
    side: false
    cues: Alternate legs rep to rep, keep the non-working leg vertical, and brace hard so your low back stays pinned down.

single_leg_pogos:
  - name: Single-Leg Pogo Jumps
    category: ankle_stability
    category_name: Ankle Stability
    side: true
    cues: Minimal knee bend, stay stiff through the ankle, and complete one side before switching.

squat_bodyweight:
  - name: Squat
    category: knee_strength
    category_name: Knee Strength
    side: false
    cues: Chest up, knees out, break parallel if you can, and own the bottom position.

squat_jump:
  - name: Squat Jump
    category: knee_strength
    category_name: Knee Strength
    side: false
    cues: Load through the hips, explode vertically, and land softly with bent knees so you absorb the landing.

step_up_bodyweight:
  - name: Step Up
    category: knee_strength
    category_name: Knee Strength
    side: true
    requires: ["step_box"]
    cues: Complete one side before switching, drive through the heel of the top leg, and do not push off the floor.

step_up_dumbbell:
  - name: DB Step Up
    category: knee_strength
    category_name: Knee Strength
    side: true
    requires: ["step_box", "dumbbell"]
    cues: Hold one dumbbell in the hand opposite the working leg, control the lowering phase, and switch sides only after the set.

step_up_kettlebell:
  - name: KB Step Up
    category: knee_strength
    category_name: Knee Strength
    side: true
    requires: ["step_box", "kettlebell"]
    cues: Hold one kettlebell in the hand opposite the working leg, stay tall, and make the top leg do the work.

touchdown_squat_bodyweight:
  - name: Touchdown Squat
    category: knee_stability
    category_name: Knee Stability
    side: true
    requires: ["step_box"]
    cues: Tap the heel lightly to the box, keep the working knee tracking out, and finish one side before switching.

touchdown_squat_dumbbell:
  - name: DB Touchdown Squat
    category: knee_stability
    category_name: Knee Stability
    side: true
    requires: ["step_box", "dumbbell"]
    cues: Hold one dumbbell in the hand opposite the working leg, control the descent, and switch sides after the set.

touchdown_squat_kettlebell:
  - name: KB Touchdown Squat
    category: knee_stability
    category_name: Knee Stability
    side: true
    requires: ["step_box", "kettlebell"]
    cues: Hold one kettlebell in the hand opposite the working leg, touch the box softly, and complete one side at a time.

v_up:
  - name: V-Up
    category: core_strength
    category_name: Core Strength
    side: false
    cues: Reach hands and feet toward each other together, then lower with control instead of flopping back down.

wall_sit:
  - name: Wall Sit
    category: knee_strength
    category_name: Knee Strength
    side: false
    cues: Thighs parallel to the floor, back flat on the wall, and breathe steadily through the hold.
